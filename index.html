<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGRIDZI</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Viaoda+Libre&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle, #000000, #202020);
            min-height: 100vh;

            font-family: "Viaoda Libre", serif;
            font-weight: 400;
            font-style: normal;

            margin: 0;
            padding: 0;
            background-image: url('https://i.imgur.com/G32J5dX.jpeg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
        }

        .img-base {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .img-top {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div class="row my-3 me-1">
        <div class='col d-flex flex-row-reverse'>
            <button type='button' class='btn' onclick="share()">
                <i class="bi bi-share-fill text-light"></i>
            </button>
        </div>
    </div>
    <div class="container d-flex flex-column px-4">
        <div class="avatar-wrapper">
            <img src="https://imgur.com/nsTGdGm.jpeg" class="img-base">
            <img src="https://i.imgur.com/Rf12NS0.png" class="img-top">
        </div>
        <div class="d-flex flex-row justify-content-center">
            <h1 class="text-light" style="font-size: 3.5rem;">
                Ingrid Zi
            </h1>
        </div>
        <div class="d-flex flex-row justify-content-center">
            <span class="text-light fs-5">
                • Tatuadora • Artista Plástica • Astróloga •
            </span>
        </div>

        <a href="https://www.instagram.com/ingridzi_tattooer" target="_blank" style="text-decoration:none;"
            class="text-dark">
            <div class="card card-body py-0 mx-4 my-2 d-flex flex-row align-items-center">
                <div class="justify-content-center">
                    <span style="font-size: 2rem;">
                        <i class="bi bi-instagram"></i>
                    </span>
                </div>
                <span class="d-flex justify-content-center p-1 w-100" style="font-size: 2rem;">
                    Instagram </span>
            </div>
        </a>

        <a href=" https://pin.it/4U1RVlobZ" target="_blank" style="text-decoration:none;" class="text-dark">
            <div class="card card-body py-0 mx-4 my-2 d-flex flex-row align-items-center">
                <div class="justify-content-center">
                    <span style="font-size: 2rem;">
                        <i class="bi bi-pinterest"></i>
                    </span>
                </div>
                <span class="d-flex justify-content-center p-1 w-100" style="font-size: 2rem;">
                    Pinterest </span>
            </div>
        </a>
        <a href=" https://wa.me/message/QA5HAGYCTJ2VL1" target="_blank" style="text-decoration:none;" class="text-dark">
            <div class="card card-body py-0 mx-4 my-2 d-flex flex-row align-items-center">
                <div class="justify-content-center">
                    <span style="font-size: 2rem;">
                        <i class="bi bi-whatsapp"></i>
                    </span>
                </div>
                <span class="d-flex justify-content-center p-1 w-100" style="font-size: 2rem;"> Whatsapp
                </span>
            </div>
        </a>
    </div>
</body>
<script>
    function share() {
        if (navigator.share) {
            navigator.share({
                title: 'Ingrid Zi - Links',
                text: 'Confira meus links!',
                url: window.location.href
            }).catch(err => console.log('Erro ao compartilhar:', err));
        } else {
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = window.location.href;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
        }
    }
</script>

</html>
